# Web nginx for the "api on the host" topology (docker-compose.hostapi.yml).
# The SPA is built with VITE_API_BASE=http://localhost:<port>, so the BROWSER calls the
# host api directly (CORS is open on the api). nginx therefore only serves static files —
# no /api reverse proxy (the full-stack nginx.conf proxies to the `api` container, which
# doesn't exist in this topology and would make nginx fail to start).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: every path serves index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
