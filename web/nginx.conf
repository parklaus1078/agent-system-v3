server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy: the SPA calls /api/... ; strip /api/ and forward to the backend.
    # Same origin -> no CORS, and the browser only ever talks to this server.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;   # real-mode steps (claude -p) can run for minutes
        proxy_send_timeout 600s;
    }

    # SPA: every other path serves index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
